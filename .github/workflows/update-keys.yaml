name: Update SOPS Keys

# Re-encrypts secrets when .sops.yaml changes (e.g. team member added/removed).
# Uses the GitHub Actions age key stored as a repo secret.

on:
  push:
    branches: [main]
    paths: ['.sops.yaml']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sops + age
        run: |
          curl -Lo /tmp/sops https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops

          curl -Lo /tmp/age.tar.gz https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz
          tar xf /tmp/age.tar.gz -C /tmp
          sudo mv /tmp/age/age /usr/local/bin/age
          sudo mv /tmp/age/age-keygen /usr/local/bin/age-keygen

      - name: Write age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Update keys on all secret files
        run: |
          for f in secrets/*.yaml; do
            echo "Updating keys: $f"
            sops updatekeys -y "$f"
          done

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet secrets/; then
            echo "No changes to commit"
          else
            git add secrets/
            git commit -m "chore: re-encrypt secrets with updated keys"
            git push
          fi
